const sections = [
  { key: "Central", label: "Central / Autonomous institutions", badgeClass: "badge-central" },
  { key: "Government", label: "Government colleges", badgeClass: "badge-govt" },
  { key: "Deemed", label: "Deemed universities", badgeClass: "badge-deemed" },
  { key: "Private", label: "Private & aided colleges", badgeClass: "badge-private" },
];

function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  const t = document.getElementById("typeFilter").value;
  let count = 0;
  sections.forEach(sec => {
    const matching = colleges.filter(c =>
      (t === "" || c.type === t) &&
      (q === "" || c.name.toLowerCase().includes(q) || (c.note && c.note.toLowerCase().includes(q))) &&
      c.type === sec.key
    );
    const secEl = document.getElementById("sec_" + sec.key);
    const gridEl = document.getElementById("grid_" + sec.key);
    if (matching.length === 0) { secEl.classList.add("hidden"); return; }
    secEl.classList.remove("hidden");
    count += matching.length;
    gridEl.innerHTML = matching.map((c, i) => `
      <div class="college-card">
        <div class="college-name">${i+1 < 10 ? '0' : ''}${i+1}. ${c.name}</div>
        ${c.note ? `<div class="college-meta">${c.note}</div>` : ""}
      </div>
    `).join("");
  });
  document.getElementById("showingCount").textContent = count;
  const noRes = document.getElementById("noResults");
  if (count === 0) noRes.style.display = "block"; else noRes.style.display = "none";
}

const container = document.getElementById("collegeList");
sections.forEach(sec => {
  const div = document.createElement("div");
  div.id = "sec_" + sec.key;
  div.innerHTML = `
    <div class="section-title">${sec.label} <span class="badge ${sec.badgeClass}">${sec.key}</span></div>
    <div class="college-grid" id="grid_${sec.key}"></div>
  `;
  container.appendChild(div);
});
const noRes = document.createElement("div");
noRes.id = "noResults";
noRes.className = "no-results";
noRes.style.display = "none";
noRes.textContent = "No colleges match your search.";
container.appendChild(noRes);

filter();
</script>
